[unstable]
# build-std compiles the core library from source for our target.
# We need this because x86_64-unknown-none has no pre-built standard library.
# "compiler-builtins-mem" provides memcpy/memset/etc. since we have no libc.
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]

[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "link-arg=-no-pie",       # Kernels are loaded at a fixed address, not PIE
    "-C", "relocation-model=static", # Emit absolute addresses, not PIC relocations
]
